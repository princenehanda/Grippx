name: Sync National Flag Products

on:
  schedule:
    # Runs every 6 hours. Cron is in UTC.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated files back

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch National Flag feed
        env:
          NF_EMAIL: ${{ secrets.NF_EMAIL }}
          NF_PASSWORD: ${{ secrets.NF_PASSWORD }}
        run: node scripts/sync-nationalflag.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build products.json and bake catalogue schema
        run: python3 scripts/build_products.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json catalogue.html
          if git diff --cached --quiet; then
            echo "No product changes — nothing to commit."
          else
            git commit -m "Auto-sync: update products from National Flag feed"
            git push
          fi
